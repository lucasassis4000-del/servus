<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil do Profissional — SERVUS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif}</style>
</head>
<body class="bg-gray-50">

<nav class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
    <a href="/" class="flex items-center gap-2">
      <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16"/></svg>
      </div>
      <span class="text-xl font-bold text-gray-900">SERVUS</span>
    </a>
    <a href="/profissionais.html" class="text-sm text-gray-500 hover:text-blue-600">← Voltar para busca</a>
  </div>
</nav>

<div id="loading" class="max-w-4xl mx-auto px-4 py-16 text-center text-gray-400">
  <div class="animate-spin w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full mx-auto mb-4"></div>
  <p>Carregando perfil...</p>
</div>

<div id="content" class="hidden max-w-4xl mx-auto px-4 py-8">
  <!-- Header do profissional -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-6">
    <div class="flex flex-col sm:flex-row gap-6">
      <div id="foto-container" class="flex-shrink-0"></div>
      <div class="flex-1">
        <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-4">
          <div>
            <h1 id="nome" class="text-2xl font-bold text-gray-900"></h1>
            <p id="categoria" class="text-blue-600 font-medium mt-1"></p>
            <p id="localizacao" class="text-gray-500 text-sm mt-1"></p>
          </div>
          <div class="flex flex-col gap-2 sm:text-right">
            <div id="avaliacao" class="text-yellow-500 text-xl"></div>
            <div id="valor" class="text-xl font-bold text-green-600"></div>
          </div>
        </div>
        <p id="titulo" class="mt-3 font-semibold text-gray-800"></p>
        <p id="bio" class="mt-2 text-gray-600 text-sm leading-relaxed"></p>
        <div class="flex flex-wrap gap-4 mt-4 text-sm text-gray-600">
          <span id="experiencia" class="flex items-center gap-1"></span>
          <span id="disponivel-badge"></span>
        </div>
        <!-- AÇÕES -->
        <div class="flex flex-col sm:flex-row gap-3 mt-5">
          <button id="btn-solicitar" onclick="solicitar()" class="flex-1 bg-blue-600 text-white font-bold py-3 px-6 rounded-xl hover:bg-blue-700 transition-colors">
            Solicitar Orçamento
          </button>
          <button id="btn-whatsapp" class="flex-1 bg-green-500 text-white font-bold py-3 px-6 rounded-xl hover:bg-green-600 transition-colors flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            WhatsApp
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Avaliações -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
    <h2 class="text-xl font-bold text-gray-900 mb-4">Avaliações</h2>
    <div id="avaliacoes-list" class="space-y-4">
      <p class="text-gray-400 text-sm">Carregando avaliações...</p>
    </div>
  </div>
</div>

<!-- Modal Solicitar (só para logados) -->
<div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 px-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-6">
    <h3 class="text-xl font-bold text-gray-900 mb-4">Solicitar Orçamento</h3>
    <form id="form-solicitar" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Título do serviço *</label>
        <input id="sol-titulo" type="text" placeholder="Ex: Instalação elétrica completa" required
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Descrição detalhada *</label>
        <textarea id="sol-desc" rows="3" required placeholder="Descreva o que precisa ser feito..."
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Cidade</label>
          <input id="sol-cidade" type="text" placeholder="Sua cidade"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Urgente?</label>
          <select id="sol-urgente" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="false">Não</option>
            <option value="true">Sim — é urgente</option>
          </select>
        </div>
      </div>
      <div id="form-error" class="hidden text-red-600 text-sm bg-red-50 rounded-lg px-3 py-2"></div>
      <div class="flex gap-3 pt-2">
        <button type="button" onclick="closeModal()" class="flex-1 border border-gray-200 text-gray-700 font-semibold py-2.5 rounded-xl hover:bg-gray-50">Cancelar</button>
        <button type="submit" class="flex-1 bg-blue-600 text-white font-semibold py-2.5 rounded-xl hover:bg-blue-700">Enviar solicitação</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/config.js"></script>
<script>
const profId = new URLSearchParams(location.search).get('id');
let profData = null;

async function init() {
  if (!profId) { window.location.href = '/profissionais.html'; return; }

  const profs = await API.get('servus_profissionais',
    `id=eq.${profId}&select=*,servus_perfis(id,nome,foto_url,cidade,estado,whatsapp,bio),servus_categorias(nome,icone)`);
  if (!profs || !profs[0]) { document.getElementById('loading').textContent = 'Profissional não encontrado.'; return; }
  profData = profs[0];

  const perfil = profData.servus_perfis || {};
  const cat = profData.servus_categorias || {};

  document.title = (perfil.nome || 'Profissional') + ' — SERVUS';
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('content').classList.remove('hidden');

  const iniciais = (perfil.nome||'P').split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase();
  document.getElementById('foto-container').innerHTML = perfil.foto_url
    ? `<img src="${perfil.foto_url}" class="w-28 h-28 rounded-2xl object-cover">`
    : `<div class="w-28 h-28 rounded-2xl bg-blue-100 flex items-center justify-center text-blue-600 font-bold text-3xl">${iniciais}</div>`;

  document.getElementById('nome').textContent = perfil.nome || 'Profissional';
  document.getElementById('categoria').textContent = `${cat.icone||''} ${cat.nome||''}`;
  document.getElementById('localizacao').textContent = cidadeEstado(perfil.cidade, perfil.estado);
  document.getElementById('titulo').textContent = profData.titulo || '';
  document.getElementById('bio').textContent = profData.descricao || perfil.bio || '';

  const nota = Math.round(profData.media_avaliacao || 0);
  document.getElementById('avaliacao').innerHTML = `${'★'.repeat(nota)}${'☆'.repeat(5-nota)} <span class="text-gray-400 text-sm">(${profData.total_avaliacoes||0})</span>`;
  document.getElementById('valor').textContent = profData.valor_hora ? `R$ ${profData.valor_hora}/h` : '';
  document.getElementById('experiencia').innerHTML = profData.anos_experiencia
    ? `🏆 ${profData.anos_experiencia} anos de experiência` : '';
  document.getElementById('disponivel-badge').innerHTML = profData.disponivel
    ? `<span class="bg-green-100 text-green-700 text-xs font-semibold px-2 py-1 rounded-full">✓ Disponível</span>`
    : `<span class="bg-gray-100 text-gray-500 text-xs font-semibold px-2 py-1 rounded-full">Indisponível</span>`;

  if (perfil.whatsapp) {
    const tel = perfil.whatsapp.replace(/\D/g,'');
    document.getElementById('btn-whatsapp').onclick = () =>
      window.open(`https://wa.me/55${tel}?text=Olá, vi seu perfil no SERVUS e gostaria de um orçamento.`, '_blank');
  }

  // Preencher cidade no modal
  if (Auth.isLoggedIn()) {
    const p = Auth.getPerfil();
    if (p) document.getElementById('sol-cidade').value = p.cidade || '';
  }

  // Avaliações
  const avs = await API.get('servus_avaliacoes',
    `profissional_id=eq.${profId}&order=created_at.desc&limit=10&select=*,servus_perfis(nome)`);
  const avList = document.getElementById('avaliacoes-list');
  if (!avs || avs.length === 0) {
    avList.innerHTML = `<p class="text-gray-400 text-sm">Nenhuma avaliação ainda. Seja o primeiro a contratar!</p>`;
  } else {
    avList.innerHTML = avs.map(a => {
      const cn = a.servus_perfis?.nome || 'Cliente';
      return `<div class="border-b border-gray-100 pb-4 last:border-0 last:pb-0">
        <div class="flex items-center justify-between mb-1">
          <span class="font-medium text-gray-800 text-sm">${cn}</span>
          <span class="text-yellow-500">${'★'.repeat(a.nota)}${'☆'.repeat(5-a.nota)}</span>
        </div>
        <p class="text-gray-600 text-sm">${a.comentario || ''}</p>
        <p class="text-gray-400 text-xs mt-1">${formatData(a.created_at)}</p>
      </div>`;
    }).join('');
  }
}

function solicitar() {
  if (!Auth.isLoggedIn()) {
    window.location.href = '/login.html?redirect=/perfil.html?id=' + profId;
    return;
  }
  document.getElementById('modal').classList.remove('hidden');
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }

document.getElementById('form-solicitar').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('form-error');
  errEl.classList.add('hidden');
  const btn = e.target.querySelector('button[type="submit"]');
  btn.textContent = 'Enviando...'; btn.disabled = true;
  try {
    const perfil = Auth.getPerfil();
    if (!perfil) throw new Error('Faça login para solicitar.');
    await API.post('servus_solicitacoes', {
      cliente_id: perfil.id,
      profissional_id: profId,
      categoria_id: profData.categoria_id,
      titulo: document.getElementById('sol-titulo').value,
      descricao: document.getElementById('sol-desc').value,
      cidade: document.getElementById('sol-cidade').value,
      estado: perfil.estado,
      urgente: document.getElementById('sol-urgente').value === 'true'
    });
    // Notificação
    const profPerfil = profData.servus_perfis || {};
    await API.post('servus_notificacoes', {
      destinatario_id: profPerfil.id,
      tipo: 'nova_solicitacao',
      titulo: 'Nova solicitação de serviço',
      mensagem: `${perfil.nome} enviou uma solicitação: ${document.getElementById('sol-titulo').value}`,
      dados: { cliente: perfil.nome, solicitacao: document.getElementById('sol-titulo').value }
    });
    closeModal();
    alert('Solicitação enviada com sucesso! O profissional será notificado.');
    window.location.href = '/dashboard.html';
  } catch(err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
    btn.textContent = 'Enviar solicitação'; btn.disabled = false;
  }
});

init();
</script>
</body>
</html>
