<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — SERVUS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif}</style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

<nav class="bg-white border-b border-gray-200 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-16">
    <a href="/" class="flex items-center gap-2">
      <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16"/></svg>
      </div>
      <span class="text-xl font-bold text-gray-900">SERVUS</span>
    </a>
    <a href="/cadastro.html" class="text-sm text-gray-600 hover:text-blue-600">Criar conta →</a>
  </div>
</nav>

<div class="flex-1 flex items-center justify-center px-4 py-12">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 w-full max-w-md p-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-1">Bem-vindo de volta</h1>
    <p class="text-gray-500 text-sm mb-6">Entre na sua conta SERVUS</p>

    <form id="form-login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
        <input id="email" type="email" required placeholder="seu@email.com"
          class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
        <input id="senha" type="password" required placeholder="Sua senha"
          class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div id="form-error" class="hidden text-red-600 text-sm bg-red-50 rounded-lg px-3 py-2"></div>
      <button type="submit" id="btn-submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-colors text-sm">
        Entrar
      </button>
    </form>

    <div class="mt-6 text-center">
      <p class="text-sm text-gray-500">Não tem conta? <a href="/cadastro.html" class="text-blue-600 font-semibold hover:underline">Cadastre-se grátis</a></p>
    </div>
  </div>
</div>

<script src="/js/config.js"></script>
<script>
if (Auth.isLoggedIn()) window.location.href = '/dashboard.html';
const redirect = new URLSearchParams(location.search).get('redirect') || '/dashboard.html';

document.getElementById('form-login').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('form-error');
  errEl.classList.add('hidden');
  const btn = document.getElementById('btn-submit');
  btn.textContent = 'Entrando...'; btn.disabled = true;
  try {
    await Auth.signIn(document.getElementById('email').value, document.getElementById('senha').value);
    await Auth.loadPerfil();
    window.location.href = redirect;
  } catch(err) {
    errEl.textContent = err.message.includes('Invalid login')
      ? 'E-mail ou senha incorretos.' : err.message;
    errEl.classList.remove('hidden');
    btn.textContent = 'Entrar'; btn.disabled = false;
  }
});
</script>
</body>
</html>
