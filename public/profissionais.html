<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profissionais — SERVUS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif} .card-hover{transition:transform .2s,box-shadow .2s} .card-hover:hover{transform:translateY(-4px);box-shadow:0 20px 40px rgba(0,0,0,.12)}</style>
</head>
<body class="bg-gray-50">

<!-- NAVBAR -->
<nav class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <a href="/" class="flex items-center gap-2">
        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-2 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
        </div>
        <span class="text-xl font-bold text-gray-900">SERVUS</span>
      </a>
      <div id="nav-user" class="flex items-center gap-3">
        <a href="/login.html" class="text-sm font-medium text-gray-600 hover:text-blue-600 px-3 py-2">Entrar</a>
        <a href="/cadastro.html" class="bg-blue-600 text-white text-sm font-semibold px-4 py-2 rounded-lg hover:bg-blue-700">Cadastrar</a>
      </div>
    </div>
  </div>
</nav>

<!-- FILTROS -->
<div class="bg-white border-b border-gray-200 py-4 px-4">
  <div class="max-w-7xl mx-auto">
    <div class="flex flex-col sm:flex-row gap-3">
      <select id="filtro-cat" class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="">Todas as categorias</option>
      </select>
      <input id="filtro-cidade" type="text" placeholder="Filtrar por cidade..." class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
      <select id="filtro-ordem" class="border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="avaliacao">Melhor avaliação</option>
        <option value="experiencia">Mais experiente</option>
        <option value="preco">Menor preço</option>
      </select>
      <button onclick="buscar()" class="bg-blue-600 text-white px-6 py-2 rounded-lg text-sm font-semibold hover:bg-blue-700">Buscar</button>
    </div>
  </div>
</div>

<!-- RESULTADOS -->
<div class="max-w-7xl mx-auto px-4 py-8">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Profissionais</h1>
    <span id="total" class="text-sm text-gray-500">Carregando...</span>
  </div>
  <div id="grid" class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    <div class="animate-pulse bg-white rounded-2xl h-64 border border-gray-100"></div>
    <div class="animate-pulse bg-white rounded-2xl h-64 border border-gray-100"></div>
    <div class="animate-pulse bg-white rounded-2xl h-64 border border-gray-100"></div>
    <div class="animate-pulse bg-white rounded-2xl h-64 border border-gray-100"></div>
  </div>
</div>

<script src="/js/config.js"></script>
<script>
const params = new URLSearchParams(location.search);
let categorias = [];

async function init() {
  categorias = await API.get('servus_categorias', 'ativo=eq.true&order=nome.asc');
  const sel = document.getElementById('filtro-cat');
  categorias.forEach(c => {
    const o = document.createElement('option');
    o.value = c.id; o.textContent = c.icone + ' ' + c.nome;
    sel.appendChild(o);
  });
  if (params.get('categoria')) sel.value = params.get('categoria');
  if (params.get('cidade')) document.getElementById('filtro-cidade').value = params.get('cidade');
  buscar();
  updateNav();
}

function updateNav() {
  if (Auth.isLoggedIn()) {
    const p = Auth.getPerfil();
    document.getElementById('nav-user').innerHTML = `
      <a href="/dashboard.html" class="text-sm font-medium text-gray-700 hover:text-blue-600">Olá, ${p?.nome?.split(' ')[0] || 'você'}</a>
      <a href="/dashboard.html" class="bg-blue-600 text-white text-sm font-semibold px-4 py-2 rounded-lg hover:bg-blue-700">Painel</a>`;
  }
}

async function buscar() {
  const catId = document.getElementById('filtro-cat').value;
  const cidade = document.getElementById('filtro-cidade').value.trim();
  const ordem = document.getElementById('filtro-ordem').value;

  let qparts = ['disponivel=eq.true', 'select=*,servus_perfis(nome,foto_url,cidade,estado,whatsapp),servus_categorias(nome,icone)'];
  if (catId) qparts.push('categoria_id=eq.' + catId);

  let orderStr = 'media_avaliacao.desc';
  if (ordem === 'experiencia') orderStr = 'anos_experiencia.desc';
  if (ordem === 'preco') orderStr = 'valor_hora.asc';
  qparts.push('order=' + orderStr);

  const profs = await API.get('servus_profissionais', qparts.join('&'));
  const grid = document.getElementById('grid');
  const totalEl = document.getElementById('total');

  let filtered = profs || [];
  if (cidade) filtered = filtered.filter(p => (p.servus_perfis?.cidade || '').toLowerCase().includes(cidade.toLowerCase()));

  totalEl.textContent = filtered.length + ' profissional(is) encontrado(s)';

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-400">
      <p class="text-5xl mb-3">🔍</p>
      <p class="font-semibold text-lg">Nenhum profissional encontrado</p>
      <p class="text-sm mt-1">Tente outros filtros ou <a href="/cadastro.html?tipo=profissional" class="text-blue-600 hover:underline">seja o primeiro na sua região</a></p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const perfil = p.servus_perfis || {};
    const cat = p.servus_categorias || {};
    const iniciais = (perfil.nome || 'P').split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase();
    const nota = Math.round(p.media_avaliacao || 0);
    return `
    <a href="/perfil.html?id=${p.id}" class="card-hover bg-white border border-gray-100 rounded-2xl p-5 flex flex-col block">
      <div class="flex items-start gap-3 mb-3">
        ${perfil.foto_url
          ? `<img src="${perfil.foto_url}" class="w-14 h-14 rounded-full object-cover flex-shrink-0" />`
          : `<div class="w-14 h-14 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold text-lg flex-shrink-0">${iniciais}</div>`
        }
        <div class="min-w-0">
          <div class="font-bold text-gray-900 truncate">${perfil.nome || 'Profissional'}</div>
          <div class="text-xs text-blue-600 font-medium">${cat.icone || ''} ${cat.nome || ''}</div>
          <div class="text-xs text-gray-500 mt-0.5">${cidadeEstado(perfil.cidade, perfil.estado)}</div>
        </div>
      </div>
      <div class="text-sm font-medium text-gray-700 mb-2 line-clamp-2 flex-1">${p.titulo}</div>
      <div class="flex items-center gap-1">
        <span class="text-yellow-500 text-sm">${'★'.repeat(nota)}${'☆'.repeat(5-nota)}</span>
        <span class="text-xs text-gray-400">(${p.total_avaliacoes || 0})</span>
      </div>
      <div class="flex items-center justify-between mt-3 pt-3 border-t border-gray-100">
        <span class="text-xs text-gray-500">${p.anos_experiencia || 0} anos exp.</span>
        ${p.valor_hora ? `<span class="text-sm font-bold text-green-600">R$ ${p.valor_hora}/h</span>` : '<span class="text-xs text-gray-400">Consultar</span>'}
      </div>
    </a>`;
  }).join('');
}

init();
</script>
</body>
</html>
