<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel — SERVUS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif}</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- SIDEBAR + MAIN LAYOUT -->
<div class="flex min-h-screen">
  <!-- Sidebar -->
  <aside class="w-64 bg-white border-r border-gray-200 fixed h-full hidden lg:flex flex-col">
    <div class="p-5 border-b border-gray-100">
      <a href="/" class="flex items-center gap-2">
        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16"/></svg>
        </div>
        <span class="text-xl font-bold text-gray-900">SERVUS</span>
      </a>
    </div>
    <div id="sidebar-user" class="p-5 border-b border-gray-100"></div>
    <nav class="flex-1 p-4 space-y-1">
      <a href="#visao-geral" onclick="showTab('visao-geral')" class="tab-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-100 transition-colors bg-blue-50 text-blue-700">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
        Visão Geral
      </a>
      <a href="#solicitacoes" onclick="showTab('solicitacoes')" class="tab-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-100 transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        <span id="nav-sol-label">Solicitações</span>
      </a>
      <a href="#notificacoes" onclick="showTab('notificacoes')" class="tab-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-100 transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
        Notificações <span id="notif-count" class="hidden bg-red-500 text-white text-xs rounded-full px-1.5 ml-auto"></span>
      </a>
      <a id="perfil-link" href="#perfil" onclick="showTab('perfil')" class="tab-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-100 transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        Meu Perfil
      </a>
    </nav>
    <div class="p-4 border-t border-gray-100">
      <button onclick="Auth.signOut()" class="w-full flex items-center gap-2 text-sm text-gray-500 hover:text-red-600 transition-colors px-3 py-2">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m: 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Sair
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="lg:ml-64 flex-1">
    <!-- Mobile header -->
    <div class="lg:hidden bg-white border-b border-gray-200 px-4 flex items-center justify-between h-16">
      <a href="/" class="flex items-center gap-2">
        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16"/></svg>
        </div>
        <span class="text-xl font-bold text-gray-900">SERVUS</span>
      </a>
      <button onclick="Auth.signOut()" class="text-sm text-gray-500 hover:text-red-600">Sair</button>
    </div>

    <div class="p-6 max-w-4xl mx-auto">
      <!-- Mobile nav tabs -->
      <div class="lg:hidden flex gap-2 mb-6 overflow-x-auto pb-1">
        <button onclick="showTab('visao-geral')" class="mobile-tab bg-blue-600 text-white text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap">Visão Geral</button>
        <button onclick="showTab('solicitacoes')" class="mobile-tab bg-white border border-gray-200 text-gray-600 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap">Solicitações</button>
        <button onclick="showTab('notificacoes')" class="mobile-tab bg-white border border-gray-200 text-gray-600 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap">Notificações</button>
        <button onclick="showTab('perfil')" class="mobile-tab bg-white border border-gray-200 text-gray-600 text-xs font-semibold px-4 py-2 rounded-lg whitespace-nowrap">Perfil</button>
      </div>

      <!-- VISÃO GERAL TAB -->
      <div id="tab-visao-geral" class="tab-content">
        <div id="welcome-card" class="bg-gradient-to-r from-blue-600 to-sky-500 rounded-2xl p-6 text-white mb-6">
          <h2 class="text-xl font-bold mb-1">Bem-vindo ao seu painel!</h2>
          <p class="text-blue-100 text-sm">Gerencie suas solicitações e encontre oportunidades.</p>
        </div>
        <div id="stats-cards" class="grid grid-cols-2 sm:grid-cols-3 gap-4 mb-6"></div>
        <div class="bg-white rounded-2xl border border-gray-100 p-5">
          <h3 class="font-bold text-gray-900 mb-3">Ações rápidas</h3>
          <div id="quick-actions" class="grid grid-cols-2 gap-3"></div>
        </div>
      </div>

      <!-- SOLICITAÇÕES TAB -->
      <div id="tab-solicitacoes" class="tab-content hidden">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-xl font-bold text-gray-900" id="sol-page-title">Solicitações</h2>
          <a href="/profissionais.html" id="btn-nova-sol" class="bg-blue-600 text-white text-sm font-semibold px-4 py-2 rounded-lg hover:bg-blue-700 hidden">Novo orçamento</a>
        </div>
        <div id="solicitacoes-list" class="space-y-4">
          <div class="animate-pulse bg-white rounded-xl h-24 border border-gray-100"></div>
          <div class="animate-pulse bg-white rounded-xl h-24 border border-gray-100"></div>
        </div>
      </div>

      <!-- NOTIFICAÇÕES TAB -->
      <div id="tab-notificacoes" class="tab-content hidden">
        <h2 class="text-xl font-bold text-gray-900 mb-6">Notificações</h2>
        <div id="notif-list" class="space-y-3"></div>
      </div>

      <!-- PERFIL TAB -->
      <div id="tab-perfil" class="tab-content hidden">
        <h2 class="text-xl font-bold text-gray-900 mb-6">Meu Perfil</h2>
        <div id="perfil-content"></div>
      </div>
    </div>
  </main>
</div>

<script src="/js/config.js"></script>
<script>
let perfil = null;
let profissional = null;
const statusLabels = { aberta:'🟡 Aberta', em_analise:'🔵 Em análise', aceita:'🟢 Aceita', em_andamento:'🔵 Em andamento', concluida:'✅ Concluída', cancelada:'❌ Cancelada' };

async function init() {
  if (!Auth.isLoggedIn()) { window.location.href = '/login.html'; return; }
  perfil = await Auth.loadPerfil();
  if (!perfil) { window.location.href = '/login.html'; return; }

  // Sidebar user info
  const iniciais = perfil.nome.split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase();
  document.getElementById('sidebar-user').innerHTML = `
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold text-sm flex-shrink-0">${iniciais}</div>
      <div class="min-w-0">
        <div class="font-semibold text-gray-900 text-sm truncate">${perfil.nome}</div>
        <div class="text-xs text-gray-500 capitalize">${perfil.tipo}</div>
      </div>
    </div>`;

  // Welcome card
  document.getElementById('welcome-card').innerHTML = `
    <h2 class="text-xl font-bold mb-1">Olá, ${perfil.nome.split(' ')[0]}! 👋</h2>
    <p class="text-blue-100 text-sm">${perfil.tipo === 'profissional' ? 'Gerencie suas propostas e novas solicitações.' : 'Encontre profissionais e acompanhe seus pedidos.'}</p>`;

  if (perfil.tipo === 'profissional') {
    document.getElementById('nav-sol-label').textContent = 'Pedidos Recebidos';
    document.getElementById('sol-page-title').textContent = 'Pedidos Recebidos';
    const profs = await API.get('servus_profissionais', `perfil_id=eq.${perfil.id}`);
    profissional = profs && profs[0];
  } else {
    document.getElementById('btn-nova-sol').classList.remove('hidden');
  }

  // Stats
  await loadStats();
  await loadQuickActions();
  await loadNotificacoes();
  await loadSolicitacoes();
  await loadPerfil();

  // Check hash
  const hash = location.hash.replace('#','');
  if (hash) showTab(hash);
}

async function loadStats() {
  const statsEl = document.getElementById('stats-cards');
  if (perfil.tipo === 'cliente') {
    const sols = await API.get('servus_solicitacoes', `cliente_id=eq.${perfil.id}`);
    const abertas = (sols||[]).filter(s => s.status === 'aberta').length;
    const conc = (sols||[]).filter(s => s.status === 'concluida').length;
    statsEl.innerHTML = `
      <div class="bg-white rounded-xl border border-gray-100 p-4"><div class="text-2xl font-black text-blue-600">${(sols||[]).length}</div><div class="text-xs text-gray-500 mt-1">Solicitações</div></div>
      <div class="bg-white rounded-xl border border-gray-100 p-4"><div class="text-2xl font-black text-yellow-500">${abertas}</div><div class="text-xs text-gray-500 mt-1">Em aberto</div></div>
      <div class="bg-white rounded-xl border border-gray-100 p-4"><div class="text-2xl font-black text-green-600">${conc}</div><div class="text-xs text-gray-500 mt-1">Concluídas</div></div>`;
  } else if (profissional) {
    const sols = await API.get('servus_solicitacoes', `profissional_id=eq.${profissional.id}`);
    statsEl.innerHTML = `
      <div class="bg-white rounded-xl border border-gray-100 p-4"><div class="text-2xl font-black text-blue-600">${(sols||[]).length}</div><div class="text-xs text-gray-500 mt-1">Pedidos</div></div>
      <div class="bg-white rounded-xl border border-gray-100 p-4"><div class="text-2xl font-black text-yellow-500">${profissional.total_avaliacoes||0}</div><div class="text-xs text-gray-500 mt-1">Avaliações</div></div>
      <div class="bg-white rounded-xl border border-gray-100 p-4"><div class="text-2xl font-black text-green-600">${(profissional.media_avaliacao||0).toFixed(1)}★</div><div class="text-xs text-gray-500 mt-1">Nota média</div></div>`;
  }
}

function loadQuickActions() {
  const el = document.getElementById('quick-actions');
  if (perfil.tipo === 'cliente') {
    el.innerHTML = `
      <a href="/profissionais.html" class="bg-blue-50 border border-blue-200 text-blue-700 font-semibold rounded-xl p-4 text-sm text-center hover:bg-blue-100 transition-colors">🔍<br>Buscar profissional</a>
      <a href="/solicitar.html" class="bg-green-50 border border-green-200 text-green-700 font-semibold rounded-xl p-4 text-sm text-center hover:bg-green-100 transition-colors">📋<br>Nova solicitação</a>`;
  } else {
    const pubLink = profissional ? `/perfil.html?id=${profissional.id}` : '#';
    el.innerHTML = `
      <a href="${pubLink}" class="bg-blue-50 border border-blue-200 text-blue-700 font-semibold rounded-xl p-4 text-sm text-center hover:bg-blue-100 transition-colors">👁️<br>Ver meu perfil</a>
      <button onclick="showTab('perfil')" class="bg-gray-50 border border-gray-200 text-gray-700 font-semibold rounded-xl p-4 text-sm text-center hover:bg-gray-100 transition-colors">✏️<br>Editar perfil</button>`;
  }
}

async function loadSolicitacoes() {
  const listEl = document.getElementById('solicitacoes-list');
  let sols = [];
  if (perfil.tipo === 'cliente') {
    sols = await API.get('servus_solicitacoes',
      `cliente_id=eq.${perfil.id}&order=created_at.desc&select=*,servus_categorias(nome,icone),servus_profissionais(titulo,servus_perfis(nome))`);
  } else if (profissional) {
    sols = await API.get('servus_solicitacoes',
      `profissional_id=eq.${profissional.id}&order=created_at.desc&select=*,servus_categorias(nome,icone),servus_perfis!servus_solicitacoes_cliente_id_fkey(nome,whatsapp)`);
  }
  if (!sols || sols.length === 0) {
    listEl.innerHTML = `<div class="bg-white rounded-xl border border-gray-100 p-8 text-center text-gray-400">
      <p class="text-3xl mb-2">📋</p>
      <p class="font-medium">Nenhuma solicitação ainda</p>
      ${perfil.tipo === 'cliente' ? `<a href="/profissionais.html" class="mt-2 inline-block text-blue-600 font-semibold hover:underline text-sm">Buscar profissionais →</a>` : ''}
    </div>`;
    return;
  }
  listEl.innerHTML = sols.map(s => {
    const cat = s.servus_categorias || {};
    const status = statusLabels[s.status] || s.status;
    const clienteInfo = perfil.tipo === 'profissional' && s.servus_perfis ? s.servus_perfis : null;
    const profInfo = perfil.tipo === 'cliente' && s.servus_profissionais?.servus_perfis ? s.servus_profissionais.servus_perfis : null;
    return `<div class="bg-white rounded-xl border border-gray-100 p-5">
      <div class="flex items-start justify-between gap-3">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-1">
            <span class="text-sm">${cat.icone||'🔧'}</span>
            <span class="font-bold text-gray-900 truncate">${s.titulo}</span>
            ${s.urgente ? '<span class="bg-red-100 text-red-600 text-xs font-bold px-2 py-0.5 rounded-full flex-shrink-0">URGENTE</span>' : ''}
          </div>
          <p class="text-sm text-gray-500 line-clamp-2">${s.descricao}</p>
          ${clienteInfo ? `<p class="text-xs text-blue-600 mt-1 font-medium">Cliente: ${clienteInfo.nome} ${clienteInfo.whatsapp ? `<a href="https://wa.me/55${clienteInfo.whatsapp.replace(/\D/g,'')}?text=Olá ${clienteInfo.nome}, vi sua solicitação no SERVUS" target="_blank" class="text-green-600 hover:underline">📱 WhatsApp</a>` : ''}</p>` : ''}
          ${profInfo ? `<p class="text-xs text-blue-600 mt-1">Profissional: ${s.servus_profissionais?.titulo||''}</p>` : ''}
        </div>
        <div class="text-right flex-shrink-0">
          <span class="text-xs font-semibold">${status}</span>
          <div class="text-xs text-gray-400 mt-1">${formatData(s.created_at)}</div>
        </div>
      </div>
      ${perfil.tipo === 'profissional' && s.status === 'aberta' ? `
        <div class="mt-3 pt-3 border-t border-gray-100 flex gap-2">
          <button onclick="aceitarSolicitacao('${s.id}')" class="flex-1 bg-green-600 text-white text-xs font-semibold py-2 rounded-lg hover:bg-green-700">✓ Aceitar</button>
          <button onclick="recusarSolicitacao('${s.id}')" class="flex-1 bg-gray-100 text-gray-600 text-xs font-semibold py-2 rounded-lg hover:bg-gray-200">✗ Recusar</button>
        </div>` : ''}
    </div>`;
  }).join('');
}

async function aceitarSolicitacao(id) {
  await API.patch('servus_solicitacoes', id, { status: 'aceita' });
  await loadSolicitacoes();
}
async function recusarSolicitacao(id) {
  await API.patch('servus_solicitacoes', id, { status: 'cancelada' });
  await loadSolicitacoes();
}

async function loadNotificacoes() {
  const notifs = await API.get('servus_notificacoes',
    `destinatario_id=eq.${perfil.id}&order=created_at.desc&limit=20`);
  const naoLidas = (notifs||[]).filter(n=>!n.lida).length;
  const countEl = document.getElementById('notif-count');
  if (naoLidas > 0) { countEl.textContent = naoLidas; countEl.classList.remove('hidden'); }
  const listEl = document.getElementById('notif-list');
  if (!notifs || notifs.length === 0) {
    listEl.innerHTML = `<div class="bg-white rounded-xl border border-gray-100 p-8 text-center text-gray-400"><p class="text-3xl mb-2">🔔</p><p>Nenhuma notificação</p></div>`;
    return;
  }
  listEl.innerHTML = notifs.map(n => `
    <div class="bg-white rounded-xl border ${n.lida ? 'border-gray-100' : 'border-blue-200 bg-blue-50/30'} p-4 cursor-pointer" onclick="marcarLida('${n.id}', this)">
      <div class="flex items-start justify-between gap-3">
        <div>
          <p class="font-semibold text-gray-900 text-sm">${n.titulo}</p>
          <p class="text-gray-600 text-sm mt-0.5">${n.mensagem}</p>
          <p class="text-gray-400 text-xs mt-1">${formatData(n.created_at)}</p>
        </div>
        ${n.lida ? '' : '<div class="w-2 h-2 bg-blue-600 rounded-full flex-shrink-0 mt-1"></div>'}
      </div>
    </div>`).join('');
}

async function marcarLida(id, el) {
  await API.patch('servus_notificacoes', id, { lida: true });
  el.classList.remove('border-blue-200', 'bg-blue-50/30');
  el.classList.add('border-gray-100');
  el.querySelector('.w-2')?.remove();
}

function loadPerfil() {
  const el = document.getElementById('perfil-content');
  el.innerHTML = `<div class="bg-white rounded-2xl border border-gray-100 p-6 space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <div><label class="text-xs font-medium text-gray-500 uppercase tracking-wider">Nome</label><p class="text-gray-900 font-medium mt-1">${perfil.nome}</p></div>
      <div><label class="text-xs font-medium text-gray-500 uppercase tracking-wider">Tipo</label><p class="text-gray-900 font-medium mt-1 capitalize">${perfil.tipo}</p></div>
      <div><label class="text-xs font-medium text-gray-500 uppercase tracking-wider">WhatsApp</label><p class="text-gray-900 font-medium mt-1">${perfil.whatsapp||'-'}</p></div>
      <div><label class="text-xs font-medium text-gray-500 uppercase tracking-wider">Localização</label><p class="text-gray-900 font-medium mt-1">${cidadeEstado(perfil.cidade, perfil.estado)||'-'}</p></div>
    </div>
    ${profissional ? `<hr class="border-gray-100">
    <div class="grid grid-cols-2 gap-4">
      <div><label class="text-xs font-medium text-gray-500 uppercase tracking-wider">Título</label><p class="text-gray-900 font-medium mt-1">${profissional.titulo||'-'}</p></div>
      <div><label class="text-xs font-medium text-gray-500 uppercase tracking-wider">Valor/hora</label><p class="text-gray-900 font-medium mt-1">${profissional.valor_hora ? 'R$ '+profissional.valor_hora : '-'}</p></div>
    </div>` : ''}
    <div class="pt-2">
      <a href="${profissional ? `/perfil.html?id=${profissional.id}` : '/profissionais.html'}" class="inline-block bg-blue-600 text-white text-sm font-semibold px-5 py-2.5 rounded-xl hover:bg-blue-700">
        ${profissional ? 'Ver meu perfil público →' : 'Buscar profissionais →'}
      </a>
    </div>
  </div>`;
}

function showTab(tabName) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
  document.getElementById('tab-' + tabName)?.classList.remove('hidden');
  document.querySelectorAll('.tab-link').forEach(l => {
    l.classList.remove('bg-blue-50', 'text-blue-700');
    if (l.getAttribute('href') === '#' + tabName) l.classList.add('bg-blue-50', 'text-blue-700');
  });
}

init();
</script>
</body>
</html>
